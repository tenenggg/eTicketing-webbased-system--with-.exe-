<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eTicketing</title> <!-- Page title for the login screen -->
  <link rel="stylesheet" href="css/styles.css"> <!-- Unified CSS style file -->
</head>


<body>
  <div class="auth-container"> <!-- Wrapper for the login form card -->
    <h1>Ticketing System</h1> <!-- Main greeting heading -->
    <p>Sign in to your account</p> <!-- Supportive text for the login area -->


    <!-- Login Form -->
    <form id="loginForm" class="auth-form">


      <!-- Username Input Section -->
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>


      <!-- Password Input Section -->
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>


      <!-- Submit button to trigger authentication -->
      <button type="submit">Sign In</button>


      <!-- Container to show login errors (like "Invalid Credentials") -->
      <div id="errorMessage" style="color: #ef4444; margin-top: 10px; font-size: 0.9rem;"></div>


      <!-- Link to navigate to registration instead -->
      <div style="margin-top: 20px; font-size: 0.9rem; text-align: center;">
        Don't have an account? <a href="register.html"
          style="color: #3b82f6; text-decoration: none; font-weight: 500;">Register here</a>
      </div>


    </form>
  </div>




  <!-- Script inclusions -->
  <script src="js/api.js"></script> <!-- global API configuration -->
  <script src="js/auth.js"></script> <!-- login logic handlers -->
</body>

</html>
