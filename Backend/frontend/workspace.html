<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Workspace — eTicketing</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body class="workspace-page">
  <div id="toast" class="toast"></div>

  <!-- Page Topbar -->
  <header class="workspace-topbar">
    <button id="backToDashBtn" class="btn-back">← Back</button>
    <div class="topbar-context">
      <span id="topbarTicketId" class="ticket-id-badge"></span>
      <span id="topbarSubject" class="ticket-subject-title"></span>
      <span id="topbarUserAssignee" class="user-only" style="margin-left:auto; font-size:1.05rem; font-weight:700; color:var(--primary); background:rgba(59, 130, 246, 0.15); padding:0.4rem 0.8rem; border-radius:20px; border: 1px solid rgba(59, 130, 246, 0.3); letter-spacing: 0.5px;"></span>
    </div>
  </header>

  <!-- 3-Section Layout -->
  <div class="workspace-grid">
    
    <!-- LEFT SECTION: Sidebar Ticket List -->
    <aside class="workspace-left">
      <div class="sidebar-header" style="flex-direction: column; gap: 0.5rem; align-items: flex-start;">
        <div style="display: flex; gap: 0.5rem; width: 100%;">
          <select id="sidebarSort" class="sidebar-select" style="flex: 1;">
            <option value="activity">All</option>
            <option value="newest">Newest</option>
          </select>
          <select id="sidebarFilterPriority" class="sidebar-select" style="flex: 1;">
            <option value="">All</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Urgent">Urgent</option>
          </select>
          <select id="sidebarFilterType" class="sidebar-select" style="flex: 1;">
            <option value="">All</option>
            <option value="General">General</option>
            <option value="Technical">Technical</option>
            <option value="Billing">Billing</option>
            <option value="Bug">Bug Report</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="sidebar-search">
        <input type="text" id="sidebarSearch" placeholder="search ticket's subject">
      </div>
      <ul id="sidebarTicketList" class="compact-ticket-list">
        <!-- JS fills this -->
        <div class="sidebar-empty">Loading tickets...</div>
      </ul>
      <div id="sidebarPagination" class="sidebar-pagination" style="display:none;"></div>
    </aside>

    <!-- MIDDLE SECTION: The Live Chat Panel -->
    <main class="workspace-middle">
      <div id="messagesList" class="chat-messages">
        <!-- JS fills this -->
      </div>
      
      <div id="closedBanner" class="closed-banner" style="display:none;">
        🔒 This ticket is closed. You cannot send further messages. Please open a new ticket if you need more help.
      </div>
      
      <div id="chatInputArea" class="chat-input-area">
        <form id="chatForm" class="chat-form">
          <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" required>
          <button type="submit" class="btn-send">Send</button>
        </form>
      </div>
    </main>

    <!-- RIGHT SECTION: Ticket Details & Admin Controls -->
    <aside class="workspace-right" id="rightPanel">
      <h3>Ticket Details</h3>
      
      <div class="detail-section">
        <h4>User Credentials</h4>
        <div class="credential-row"><strong>ID:</strong> <span id="detailUserId"></span></div>
        <div class="credential-row"><strong>Name:</strong> <span id="detailUserName"></span></div>
        <div class="credential-row"><strong>Date Submitted:</strong> <span id="detailUserDate"></span></div>
      </div>

      <div class="detail-group">
        <label>Assignee</label>
        <div class="assignee-row">
          <span id="detailAssignee">Unassigned</span>
          <button id="assignToMeBtn" class="btn-assign admin-only" style="display:none;">Assign to Me</button>
        </div>
      </div>

      <div class="detail-group">
        <label>Ticket Type</label>
        <select id="detailType" class="admin-only-select" disabled>
          <option value="General">General</option>
          <option value="Technical">Technical</option>
          <option value="Billing">Billing</option>
          <option value="Bug">Bug Report</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="detail-group">
        <label>Set Status</label>
        <select id="detailStatus" class="admin-only-select" disabled>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="On-Hold">On-Hold</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <div class="detail-group">
        <label>Set Priority</label>
        <div class="priority-pills">
          <button type="button" class="pill-btn priority-low" data-val="Low">Low</button>
          <button type="button" class="pill-btn priority-medium" data-val="Medium">Medium</button>
          <button type="button" class="pill-btn priority-high" data-val="High">High</button>
          <button type="button" class="pill-btn priority-urgent" data-val="Urgent">Urgent</button>
        </div>
      </div>

    </aside>
  </div>

  <script src="js/api.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/workspace.js"></script>
</body>
</html>
